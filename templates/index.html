<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="container">
        <header class="header">
            <h1>Text Summarizer</h1>
            <p>Upload a .txt file and generate an AI summary with Groq.</p>
        </header>

        <section class="upload-section">
            <div id="drop-zone" class="drop-zone" tabindex="0" role="button" aria-label="Upload a text file">
                <p class="drop-zone-title">Drop .txt file here</p>
                <p class="drop-zone-subtitle">or click to browse</p>
                <input type="file" id="file-input" accept=".txt,text/plain" hidden>
            </div>
            <p id="status-message" class="status-message" aria-live="polite"></p>
        </section>

        <section class="actions">
            <button id="summarize-btn" type="button" disabled>Summarize</button>
            <span id="loading-indicator" class="loading-indicator hidden">Summarizing...</span>
        </section>

        <section class="panels">
            <div class="panel">
                <label for="original-text">Original Text</label>
                <textarea id="original-text" readonly placeholder="Uploaded file content will appear here."></textarea>
            </div>
            <div class="panel">
                <label for="summary-text">Summary</label>
                <textarea id="summary-text" readonly placeholder="Your summary will appear here."></textarea>
            </div>
        </section>
    </main>

    <script>
        const dropZone = document.getElementById("drop-zone");
        const fileInput = document.getElementById("file-input");
        const originalText = document.getElementById("original-text");
        const summaryText = document.getElementById("summary-text");
        const summarizeBtn = document.getElementById("summarize-btn");
        const loadingIndicator = document.getElementById("loading-indicator");
        const statusMessage = document.getElementById("status-message");

        let activeText = "";

        function setStatus(message, isError = false) {
            statusMessage.textContent = message;
            statusMessage.classList.toggle("error", isError);
        }

        function setLoading(isLoading) {
            summarizeBtn.disabled = isLoading || !activeText;
            loadingIndicator.classList.toggle("hidden", !isLoading);
        }

        async function uploadFile(file) {
            if (!file) {
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            setStatus("Uploading file...");
            summaryText.value = "";

            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    body: formData,
                });
                const data = await response.json();

                if (!response.ok) {
                    setStatus(data.error || "Upload failed.", true);
                    return;
                }

                activeText = data.text;
                originalText.value = data.text;
                summarizeBtn.disabled = false;
                setStatus(`Loaded ${data.filename}`);
            } catch (error) {
                setStatus("Upload failed. Please try again.", true);
            }
        }

        async function summarize() {
            if (!activeText) {
                setStatus("Please upload a .txt file first.", true);
                return;
            }

            setLoading(true);
            setStatus("Generating summary...");

            try {
                const response = await fetch("/summarize", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: activeText }),
                });
                const data = await response.json();

                if (!response.ok) {
                    summaryText.value = "";
                    setStatus(data.error || "Summarization failed.", true);
                    return;
                }

                summaryText.value = data.summary;
                setStatus("Summary ready.");
            } catch (error) {
                summaryText.value = "";
                setStatus("Summarization failed. Please try again.", true);
            } finally {
                setLoading(false);
            }
        }

        dropZone.addEventListener("click", () => fileInput.click());

        dropZone.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                fileInput.click();
            }
        });

        fileInput.addEventListener("change", () => {
            uploadFile(fileInput.files[0]);
            fileInput.value = "";
        });

        dropZone.addEventListener("dragover", (event) => {
            event.preventDefault();
            dropZone.classList.add("drag-over");
        });

        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("drag-over");
        });

        dropZone.addEventListener("drop", (event) => {
            event.preventDefault();
            dropZone.classList.remove("drag-over");
            uploadFile(event.dataTransfer.files[0]);
        });

        summarizeBtn.addEventListener("click", summarize);
    </script>
</body>
</html>
